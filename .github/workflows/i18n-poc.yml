# Illustrative build workflow for the i18n proof of concept.
#
# It is intentionally NOT wired to deploy: the live site still publishes from
# the repo root via plain GitHub Pages, and this PoC lives in /i18n-poc so it
# can't disturb production. Trigger is manual (workflow_dispatch); it builds the
# multilingual site and uploads it as an artifact you can download and inspect.
#
# To productionise later: move the build to the repo root (or point Pages at the
# build output), switch the Pages "Source" to "GitHub Actions", and change the
# trigger to `push` on `main`.
name: i18n PoC — build (no deploy)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: i18n-poc
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: vesta-i18n-site
          path: i18n-poc/_site
